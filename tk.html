<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業快樂！</title>
    <style>
        /* CSS：美化網頁介面 */
        body {
            font-family: 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* 灰藍色背景 */
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 10px;
            width: 80%;
        }
        button {
            padding: 10px 20px;
            background-color: #5d9cec;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
        #hidden-message {
            display: none; /* 預設隱藏想說的話 */
            margin-top: 20px;
            line-height: 1.6;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">分科加油！</h1>
    <p id="status-text">現在是衝刺期，專心準備考試，這份祝福會陪著你。</p>

    <!-- 密碼輸入區域 -->
    <div id="auth-section">
        <input type="password" id="password" placeholder="輸入密碼解鎖真心話">
        <br>
        <button onclick="checkStatus()">解鎖祝福</button>
    </div>

    <!-- 隱藏的心語區域 -->
    <div id="hidden-message">
        <p>（這是在 7/13 分科考完後才會出現的內容）</p>
        <p>辛苦了！雖然我們不常聊天，但我一直很佩服你的努力...</p>
        <p>祝你上理想的大學，開啟精彩的下一章！</p>
    </div>
</div>

<script>
    // JavaScript：控制邏輯
    function checkStatus() {
        // 1. 設定解鎖日期 (格式：年, 月(從0開始), 日, 時, 分)
        // 注意：JavaScript 的月份是從 0 開始，所以 7 月要寫 6
        const unlockDate = new Date(2026, 6, 13, 18, 0, 0); 
        const now = new Date(); // 獲取現在時間
        
        // 2. 設定你想要的密碼
        const correctPassword = "0713"; // 你可以改成他的學號、生日或你們約定的密碼
        
        const inputPassword = document.getElementById('password').value;
        const messageDiv = document.getElementById('hidden-message');
        const authSection = document.getElementById('auth-section');
        const statusText = document.getElementById('status-text');
        const title = document.getElementById('title');

        // 3. 邏輯判斷
        if (now < unlockDate) {
            // 如果還沒到 7/13
            alert("現在還太早囉！先把這份驚喜留到分科考完那天再打開吧。加油！");
        } else {
            // 如果已經考完了
            if (inputPassword === correctPassword) {
                // 密碼正確
                authSection.style.display = "none"; // 隱藏輸入框
                statusText.style.display = "none";   // 隱藏原本的加油文字
                title.innerHTML = "給你的悄悄話";      // 更改標題
                messageDiv.style.display = "block";  // 顯示隱藏的心語內容
            } else {
                // 密碼錯誤
                alert("密碼不對喔，再試試看？");
            }
        }
    }
</script>

</body>
</html>
