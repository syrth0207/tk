<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業快樂！</title>
    <style>
        /* CSS：美化網頁介面 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* 使用溫暖平和的漸層色 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 85%;
            width: 400px;
        }
        h1 {
            color: #4a90e2;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box; /* 確保寬度包含 padding */
            text-align: center;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background-color: #5d9cec;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #4a89dc;
        }
        /* 隱藏的心語區域 */
        #hidden-message {
            display: none; 
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #ddd;
            text-align: left; /* 心語用左對齊比較好閱讀 */
        }
        .heart-icon {
            color: #e74c3c;
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">分科加油！</h1>
    <p id="status-text">這是一個為你準備的數位時光膠囊。<br>現在請先專心應考，祝福一直都在。</p>

    <!-- 密碼輸入區域 -->
    <div id="auth-section">
        <input type="password" id="password" placeholder="請輸入解鎖密碼">
        <br>
        <button onclick="checkStatus()">解鎖祝福</button>
    </div>

    <!-- 隱藏的心語區域 -->
    <div id="hidden-message">
        <div style="text-align: center;"><span class="heart-icon">❤</span></div>
        <p>辛苦了！在你看到這段文字的時候，分科測驗應該已經順利結束了吧。</p>
        <p>雖然我們在學校不常聊天，但我一直很佩服你為了目標而努力的樣子。這份禮物是在畢業那天送出的，而這段話是想在今天正式祝賀你完成了這場挑戰。</p>
        <p>不論結果如何，我都相信你的優秀會帶你去理想的地方。祝你在大學開啟非常精彩的新篇章！加油！</p>
    </div>
</div>

<script>
    function checkStatus() {
        // 1. 設定解鎖日期 (2026年7月13日 18:00)
        // JS 月份從 0 開始，所以 7 月要填 6
        const unlockDate = new Date(2026, 6, 13, 18, 0, 0); 
        const now = new Date(); 
        
        // 2. 密碼已設定為 0731
        const correctPassword = "0731"; 
        
        const inputPassword = document.getElementById('password').value;
        const messageDiv = document.getElementById('hidden-message');
        const authSection = document.getElementById('auth-section');
        const statusText = document.getElementById('status-text');
        const title = document.getElementById('title');

        // 3. 邏輯判斷
        if (now < unlockDate) {
            // 如果還沒到考完時間
            alert("現在還太早囉！先把這份驚喜留到分科考完那天再打開吧。專心考試，加油！");
        } else {
            // 時間到了，檢查密碼
            if (inputPassword === correctPassword) {
                authSection.style.display = "none"; 
                statusText.style.display = "none";   
                title.innerHTML = "給你的真心話";      
                messageDiv.style.display = "block";  
            } else {
                alert("密碼不對喔，再試試看？");
            }
        }
    }
</script>

</body>
</html>
